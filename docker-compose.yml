services:
  mysql:
    image: mysql:8.0
    container_name: innovatech-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: innovatech
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - innovatech-net

  ventas:
    build:
      context: ../back-ventas-springboot/Springboot-API-REST
    container_name: back-ventas
    restart: always
    environment:
      SERVER_PORT: 8082
      DB_ENDPOINT: mysql
      DB_PORT: 3306
      DB_NAME: innovatech
      DB_USERNAME: appuser
      DB_PASSWORD: apppass
    ports:
      - "8082:8082"
    depends_on:
      - mysql
    networks:
      - innovatech-net

  despachos:
    build:
      context: ../back-despachos-springboot/Springboot-API-REST-DESPACHO
    container_name: back-despachos
    restart: always
    environment:
      SERVER_PORT: 8081
      DB_ENDPOINT: mysql
      DB_PORT: 3306
      DB_NAME: innovatech
      DB_USERNAME: appuser
      DB_PASSWORD: apppass
    ports:
      - "8081:8081"
    depends_on:
      - mysql
    networks:
      - innovatech-net

  frontend:
    build:
      context: .
    container_name: front-despacho
    restart: always
    ports:
      - "80:80"
    depends_on:
      - ventas
      - despachos
    networks:
      - innovatech-net

volumes:
  mysql_data:

networks:
  innovatech-net:
    driver: bridge
    